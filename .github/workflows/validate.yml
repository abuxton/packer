---
name: Validate Packer Templates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Check HCL formatting
        run: |
          for dir in gcp-ubuntu ubuntu-docker-mirror ubuntu-docker-local-container tfe-local-mirror; do
            echo "==> Checking formatting in ${dir}..."
            packer fmt -check -recursive "${dir}"
            echo "    OK"
          done

  validate:
    name: Validate Templates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        template:
          - gcp-ubuntu
          - ubuntu-docker-mirror
          - ubuntu-docker-local-container
          - tfe-local-mirror
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Initialize Packer plugins
        run: packer init "${{ matrix.template }}"

      - name: Create placeholder license file for tfe-local-mirror validation
        if: matrix.template == 'tfe-local-mirror'
        run: echo "placeholder" > tfe-local-mirror/files/terraform.hclic

      - name: Validate template
        run: |
          if [ "${{ matrix.template }}" = "tfe-local-mirror" ]; then
            packer validate \
              -var "project_id=${GCP_PROJECT_ID:-placeholder-project-id}" \
              -var "tfe_version=1.2.1" \
              -var "tfe_license_file=tfe-local-mirror/files/terraform.hclic" \
              "${{ matrix.template }}"
          else
            packer validate \
              -var "project_id=${GCP_PROJECT_ID:-placeholder-project-id}" \
              "${{ matrix.template }}"
          fi
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning
