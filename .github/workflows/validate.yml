---
name: Validate Packer Templates

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Check HCL formatting
        run: |
          for dir in gcp-ubuntu ubuntu-docker-mirror ubuntu-docker-local-container tfe-local-mirror-gcp tfe-local-mirror-aws tfe-local-mirror-azure tfe-local-mirror-vmware; do
            echo "==> Checking formatting in ${dir}..."
            packer fmt -check -recursive "${dir}"
            echo "    OK"
          done

  validate:
    name: Validate Templates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - template: gcp-ubuntu
            extra_vars: "-var 'project_id=${GCP_PROJECT_ID:-placeholder-project-id}'"
          - template: ubuntu-docker-mirror
            extra_vars: "-var 'project_id=${GCP_PROJECT_ID:-placeholder-project-id}'"
          - template: ubuntu-docker-local-container
            extra_vars: "-var 'project_id=${GCP_PROJECT_ID:-placeholder-project-id}'"
          - template: tfe-local-mirror-gcp
            extra_vars: "-var 'project_id=${GCP_PROJECT_ID:-placeholder-project-id}' -var 'tfe_version=1.2.1'"
            license_dir: tfe-local-mirror-gcp
          - template: tfe-local-mirror-aws
            extra_vars: ""
            license_dir: tfe-local-mirror-aws
          - template: tfe-local-mirror-azure
            extra_vars: "-var 'subscription_id=placeholder' -var 'resource_group=placeholder'"
            license_dir: tfe-local-mirror-azure
          - template: tfe-local-mirror-vmware
            extra_vars: "-var 'vcenter_server=placeholder' -var 'vcenter_username=placeholder' -var 'vcenter_password=placeholder' -var 'cluster=placeholder' -var 'datastore=placeholder' -var 'network=placeholder'"
            license_dir: tfe-local-mirror-vmware
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Initialize Packer plugins
        run: packer init "${{ matrix.template }}"

      - name: Create placeholder license file
        if: matrix.license_dir != ''
        run: echo "placeholder" > "${{ matrix.license_dir }}/files/terraform.hclic"

      - name: Validate template
        run: packer validate ${{ matrix.extra_vars }} "${{ matrix.template }}"
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning
